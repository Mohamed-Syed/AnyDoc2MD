name: Build standalone packages

# Builds the self-contained Linux and macOS bundles on their native
# runners (PyInstaller cannot cross-compile). The Windows bundle is built
# by the maintainer locally from the winget-installed toolchain and added
# to the release by hand, same as before this workflow existed.
#
# On a `vX.Y.Z` tag push, the built packages (plus SHA-256 checksums) are
# attached to a *draft* GitHub Release -- never published automatically,
# so there's always a review step before anything goes out. Also runs on
# demand and on pushes to the packaging branch while it's being iterated
# on; those runs stop at the build+verify stage and touch no release.
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
    branches: [linux-mac-packaging]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # Belt-and-suspenders alongside prepare_vendor.py's own subprocess
    # timeout: caps total CI minutes burned if any step hangs.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
          - os: macos-latest
            name: macos-arm64

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install Tesseract + Poppler (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr tesseract-ocr-eng tesseract-ocr-osd poppler-utils

      - name: Install Tesseract + Poppler (macOS)
        if: runner.os == 'macOS'
        # dylibbundler relocates the binaries' dependent dylibs (including
        # @rpath ones) into the bundle -- see scripts/prepare_vendor.py.
        run: brew install tesseract poppler dylibbundler

      - name: Generate macOS .icns from the PNG icon
        if: runner.os == 'macOS'
        run: |
          sips -s format icns assets/icon.png --out assets/icon.icns || \
            echo "icns generation failed; building without a bundle icon"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Stage the trimmed Tesseract/Poppler into vendor/
        run: python scripts/prepare_vendor.py

      - name: Build the standalone bundle
        run: pyinstaller anydoc2md.spec --clean --noconfirm

      - name: Smoke-test the bundled binaries resolve their libraries
        shell: bash
        run: |
          set -euo pipefail
          # The whole point of bundling is that the vendored tesseract /
          # pdftoppm run against the vendored libraries, not a system
          # install. Execute them with only the vendored dir on the loader
          # path to prove that holds.
          tess=$(find dist -type f -name tesseract | head -n1)
          ppm=$(find dist -type f -name pdftoppm | head -n1)
          echo "tesseract: $tess"
          echo "pdftoppm:  $ppm"
          test -n "$tess" && test -n "$ppm"
          if [ "${RUNNER_OS}" = "macOS" ]; then
            DYLD_LIBRARY_PATH="$(dirname "$tess")" "$tess" --version
            DYLD_LIBRARY_PATH="$(dirname "$ppm")" "$ppm" -v
          else
            LD_LIBRARY_PATH="$(dirname "$tess")" "$tess" --version
            LD_LIBRARY_PATH="$(dirname "$ppm")" "$ppm" -v
          fi
          # Language data must be present for OCR to work at all.
          find dist -name eng.traineddata | head -n1 | grep -q . \
            || { echo "eng.traineddata missing from bundle"; exit 1; }
          # License texts must ship inside the bundle (GPL/MIT requirement).
          find dist -name 'LICENSE' | head -n1 | grep -q . \
            || { echo "LICENSE missing from bundle"; exit 1; }

      - name: Package the Linux bundle
        if: runner.os == 'Linux'
        run: |
          tar -czf "AnyDoc2MD-${{ matrix.name }}.tar.gz" -C dist AnyDoc2MD

      - name: Package the macOS bundle
        if: runner.os == 'macOS'
        run: |
          # ditto preserves macOS bundle metadata that plain zip drops.
          ditto -c -k --keepParent "dist/AnyDoc2MD.app" "AnyDoc2MD-${{ matrix.name }}.zip"

      - name: Checksum the package
        # shasum -a 256 (not sha256sum) is the one hashing tool present by
        # default on both Linux and macOS runners.
        run: |
          for f in AnyDoc2MD-${{ matrix.name }}.tar.gz AnyDoc2MD-${{ matrix.name }}.zip; do
            [ -f "$f" ] && shasum -a 256 "$f" > "$f.sha256"
          done

      - name: Upload the package
        uses: actions/upload-artifact@v4
        with:
          name: AnyDoc2MD-${{ matrix.name }}
          path: |
            AnyDoc2MD-${{ matrix.name }}.tar.gz
            AnyDoc2MD-${{ matrix.name }}.tar.gz.sha256
            AnyDoc2MD-${{ matrix.name }}.zip
            AnyDoc2MD-${{ matrix.name }}.zip.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Attach packages to a draft release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: AnyDoc2MD-*
          path: release-assets
          merge-multiple: true

      - name: Create or update the draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-assets/*
          body: |
            _Draft: review before publishing._ Built automatically for
            Linux and macOS by this repository's `build-packages.yml`
            workflow, each verified in CI to run against its own bundled
            Tesseract/Poppler with no system install required. Each
            archive has a matching `.sha256` checksum file.

            The Windows build is added separately (built locally per
            [README's Standalone build section](../../README.md#standalone-build)).
