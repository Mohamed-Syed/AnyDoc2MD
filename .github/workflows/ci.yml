name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is the primary target; Linux is included because the
        # filename-sanitizing and path-redaction logic is deliberately
        # platform-independent and regressions there are easy to miss.
        os: [windows-latest, ubuntu-latest]
        # 3.10 is the floor declared in pyproject.toml (set by markitdown
        # and Pillow) and must actually be tested, not just claimed. 3.11 is
        # kept because stdlib behaviour genuinely differs there -- it caught
        # a test that asserted on a zipfile implementation detail.
        python-version: ["3.10", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: python -m pytest tests

  build-check:
    name: Verify the package builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Confirm no local paths or dev journal leaked into the sdist
        run: |
          python - <<'PY'
          import glob, tarfile, sys
          forbidden = ("SESSION_SUMMARY.md", "CLAUDE.local.md", "vendor/")
          sdist = glob.glob("dist/*.tar.gz")[0]
          names = tarfile.open(sdist).getnames()
          bad = [n for n in names if any(f in n for f in forbidden)]
          if bad:
              sys.exit(f"forbidden paths in sdist: {bad}")
          print(f"sdist clean ({len(names)} entries)")
          PY
