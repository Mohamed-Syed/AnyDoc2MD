name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Windows is the primary target; Linux is included because the
        # filename-sanitizing and path-redaction logic is deliberately
        # platform-independent and regressions there are easy to miss.
        os: [windows-latest, ubuntu-latest]
        # 3.10 is the floor declared in pyproject.toml (set by markitdown
        # and Pillow) and must actually be tested, not just claimed. 3.11 is
        # kept because stdlib behaviour genuinely differs there -- it caught
        # a test that asserted on a zipfile implementation detail.
        python-version: ["3.10", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Run tests
        run: python -m pytest tests

  build-check:
    name: Verify the package builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Verify the sdist contains only expected files
        # Allowlist, not blocklist: anything unexpected fails the build,
        # including files nobody thought to forbid. A blocklist only ever
        # catches the cases already imagined -- and naming them here would
        # publish the very filenames it is meant to keep private.
        run: |
          python - <<'PY'
          import glob, re, sys, tarfile

          ALLOWED = re.compile(
              r"^[^/]+/("
              r"PKG-INFO|README\.md|LICENSE|pyproject\.toml|setup\.cfg"
              r"|anydoc2md(/[\w.-]+)?"
              r"|tests(/[\w.-]+)?"
              r"|[\w.-]+\.egg-info(/[\w.-]+)?"
              r")$"
          )

          sdist = glob.glob("dist/*.tar.gz")[0]
          names = tarfile.open(sdist).getnames()
          unexpected = [n for n in names if "/" in n and not ALLOWED.match(n)]
          if unexpected:
              sys.exit("unexpected paths in sdist:\n  " + "\n  ".join(unexpected))
          print(f"sdist verified: {len(names)} entries, all expected")
          PY
